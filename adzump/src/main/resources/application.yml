spring:
  application:
    name: adzump
  config:
    import: configserver:http://${CLOUD_CONFIG_SERVER:localhost}:${CLOUD_CONFIG_SERVER_PORT:8888}/
  profiles:
    active: ${SPRING_PROFILE:default}

server:
  port: 8012

management:
  metrics:
    tags:
      application: ${INSTANCE_ENVIRONMENT:LOCAL}-${spring.application.name}-${INSTANCE_ID:default}

adzump:
  meta:
    # Graph API root + pinned version — the single place to bump on Meta deprecation (J3).
    # v22.0 is a current documented Graph/Marketing API version as of this slice.
    base-url: https://graph.facebook.com
    api-version: v22.0
  google:
    # Google Ads API version pin (J4). MUST match the google-ads-java stubs package the code imports
    # (com.google.ads.googleads.v24) and the library version in pom.xml (google-ads 43.2.0, which ships
    # v21..v24). Bump the library, this value, and the v24 import package together.
    api-version: v24
    # Developer token for the Google Ads API. Injected from the environment; the real secret lives in
    # the config server / env (never committed here). Empty by default so the app boots without it;
    # a Google call then fails fast with a clear "developer-token missing" error until configured.
    developer-token: ${ADZUMP_GOOGLE_DEVELOPER_TOKEN:}
  launch:
    # MONEY-SAFETY KILL-SWITCH. CampaignService.launch REFUSES to run unless this is true, even
    # though every campaign is created PAUSED — belt-and-suspenders so a real ad account can never be
    # touched by accident. Leave false in every committed environment; flip to true (env / config
    # server) only on an account you actually intend to launch against.
    live-enabled: false
