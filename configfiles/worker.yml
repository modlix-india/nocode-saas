spring:
  application:
    name: worker
  cloud:
    openfeign:
      client:
        config:
          default:
            readTimeout: 300000
            connectTimeout: 60000
  datasource:
    url: ${worker.db.url}
    username: ${worker.db.username}
    password: ${worker.db.password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  hikari:
    minimum-idle: 2
    maximum-pool-size: 4
    idle-timeout: 1800000   # 30 minutes in ms
    connection-test-query: SELECT 1
  flyway:
    enabled: true
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${worker.db.flyway.url}
    user: ${worker.db.username}
    password: ${worker.db.password}
  boot:
    admin:
      client:
        instance:
          name: worker

management:
  endpoint:
    flyway:
      enabled: true
