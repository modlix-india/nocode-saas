spring:
  application:
    name: entity-processor
  freemarker:
    check-template-location: false
  r2dbc:
    url: ${entity-processor.db.url}
    username: ${entity-processor.db.username}
    password: ${entity-processor.db.password}
    pool:
      initial-size: 2
      max-size: 4
      max-idle-time: 30m
      validation-query: SELECT 1
    flyway:
      enabled: true
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: ${entity-processor.db.flyway.url}
      user: ${entity-processor.db.username}
      password: ${entity-processor.db.password}
    boot:
      admin:
        client:
          instance:
            name: entity-processor
    servlet:
      multipart:
        max-file-size: -1
        max-request-size: -1
    cloud:
      gateway:
        routes:
          - id: entity-processor
            uri: lb://entity/processor
            predicates:
              - Path=/api/entity/processor/**, /*/api/entity/processor/**, /*/*/api/entity/processor/**, /*/*/*/api/entity/processor/**, /*/*/*/*/api/entity/processor/**, /*/*/*/*/*/api/entity/processor/**, /*/*/*/*/*/*/api/entity/processor/**, /*/*/*/*/*/*/api/entity/processor/**, /*/*/*/*/*/*/*/api/entity/processor/**, /*/*/*/*/*/*/*/*/api/entity/processor/**, /*/*/*/*/*/*/*/*/*/api/entity/processor/**,
management:
  endpoint:
    flyway:
      enabled: true

redis:
  cache:
    prefix: epro

entity-processor:
  # AppCode under which ad-platform Connection records (META_API, GOOGLE_API)
  # and their OAuth tokens are stored in Core. Lead intake / ticket data lives
  # under the lead-management app (e.g. leadzump), but the OAuth flow for ad
  # platforms is centralised on a marketing app (default: marketingai). All
  # connection lookups for ad-platform credentials route through this appCode
  # regardless of the caller's session app. Override per-deployment if your
  # marketing app is named differently.
  marketing-app-code: marketingai
