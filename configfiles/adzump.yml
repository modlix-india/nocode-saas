spring:
  application:
    name: adzump
  datasource:
    url: ${adzump.db.url}
    username: ${adzump.db.username}
    password: ${adzump.db.password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  hikari:
    minimum-idle: 2
    maximum-pool-size: 4
    idle-timeout: 1800000 # 30 minutes in ms
    connection-test-query: SELECT 1
  flyway:
    enabled: true
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${adzump.db.flyway.url}
    user: ${adzump.db.username}
    password: ${adzump.db.password}
  boot:
    admin:
      client:
        instance:
          name: Adzump

management:
  endpoint:
    flyway:
      enabled: true

redis:
  cache:
    prefix: adz
